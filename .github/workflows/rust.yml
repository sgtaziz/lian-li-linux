name: Rust

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          libwebkit2gtk-4.1-dev \
          libgtk-3-dev \
          libayatana-appindicator3-dev \
          librsvg2-dev \
          libhidapi-dev \
          libudev-dev \
          libusb-1.0-0-dev \
          pkg-config

    - name: Setup Bun
      uses: oven-sh/setup-bun@v1
      with:
        bun-version: latest

    - name: Install dependencies
      # `bun install` uses the bun.lockb lockfile for deterministic installs
      run: bun install --frozen-lockfile
      working-directory: ./crates/lianli-gui

    - name: Build
      run: cargo build --verbose

    - name: Run tests
      run: cargo test --verbose
